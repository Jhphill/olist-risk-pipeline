services:
  postgres:
    image: postgres:15
    container_name: olist_postgres
    environment:
      POSTGRES_USER: olist_user
      POSTGRES_PASSWORD: olist_pass
      POSTGRES_DB: olist_db
    ports:
      - "5433:5432"
    mem_limit: 512m
    volumes:
      - postgres_data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: olist_zookeeper
    mem_limit: 256m
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: olist_kafka
    mem_limit: 768m
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24

  spark:
    image: apache/spark:3.5.1
    container_name: olist_spark
    mem_limit: 1.5g
    entrypoint: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "4040:4040"
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./streaming:/opt/streaming
      - ./data:/opt/data
    depends_on:
      - kafka

  metabase:
    image: metabase/metabase
    container_name: olist_metabase
    ports:
      - "3000:3000"
    mem_limit: 1g
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: olist_db
      MB_DB_HOST: postgres
      MB_DB_USER: olist_user
      MB_DB_PASS: olist_pass
      JAVA_OPTS: "-Xmx768m -Xms256m"
    depends_on:
      - postgres

  airflow:
    image: apache/airflow:2.8.1
    container_name: olist_airflow
    ports:
      - "8080:8080"
    mem_limit: 1.5g
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://olist_user:olist_pass@postgres/olist_db
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    depends_on:
      - postgres

volumes:
  postgres_data:
